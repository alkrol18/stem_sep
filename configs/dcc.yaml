audio:
  sample_rate: 44100
  # 221184 = 108 × 2048 — nearest multiple of the VAE compression ratio (2048×)
  # that keeps T_lat divisible by 8 (3 UNet encoder levels × MaxPool 2×).
  # 221184 / 44100 ≈ 5.015 s per chunk.
  # VERIFY with scripts/sanity_check.py: actual T_lat is printed there.
  chunk_seconds: 5.015
  chunk_samples: 221184
  hop_samples: 110592       # chunk_samples / 2  (50 % overlap)
  # n_fft / hop_length / n_mels are unused now that we feed raw waveforms to
  # the Stable Audio Open VAE.  Kept as documentation only.
  # n_fft: 2048
  # hop_length: 512
  # n_mels: 128

vae:
  checkpoint: "stabilityai/stable-audio-open-1.0"
  latent_channels: 64       # Stable Audio Open VAE output channels
  latent_freq: 1            # 1D latent — no frequency axis
  latent_time: 108          # T / 2048 for chunk_samples=221184; confirm with sanity_check.py

clap:
  checkpoint: "./checkpoints/clap/music_audioset_epoch_15_esc_90.14.pt"
  embed_dim: 512

unet:
  base_channels: 64
  channel_multipliers: [1, 2, 4, 8]
  attention_heads: 8
  timestep_embed_dim: 256
  cond_dim: 768

diffusion:
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  schedule: "linear"
  inference_steps: 50

training:
  # 24-GB A5000: batch_size 16 is safe with 64-ch latents; drop to 8 if OOM.
  batch_size: 16
  lr: 2.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  epochs: 100
  warmup_steps: 1000
  checkpoint_every: 5
  eval_every: 10
  val_frac: 0.1
  val_every_steps: 200
  val_batches: 4
  print_every_steps: 50

augmentation:
  pitch_shift_prob: 0.3
  pitch_shift_range_semitones: 7
  pitch_skip_stems: ["drums", "percussion"]
  time_stretch_prob: 0.3
  time_stretch_range: [0.9, 1.1]
  volume_jitter_prob: 0.5
  volume_jitter_db: 3.0
  synthetic_mix_prob: 0.4
  effects_chain_prob: 0.4

triplets:
  negative_prob: 0.15
  multi_stem_prob: 0.30
  remove_framing_prob: 0.15

losses:
  smoothness_weight: 0.01
  consistency_weight: 0.1
  consistency_batch_prob: 0.15
  consistency_max_t: 200
  consistency_stem_cap: 4

paths:
  moisesdb_root: "/usr/project/xtmp/ak724/moisesdb/moisesdb_v0.1"
  musdb_root: "./datasets/musdb18hq"
  checkpoint_dir: "/usr/project/xtmp/ak724/stem_sep_checkpoints"
  log_dir: "/usr/project/xtmp/ak724/stem_sep_logs"
  output_dir: "/usr/project/xtmp/ak724/stem_sep_outputs"
